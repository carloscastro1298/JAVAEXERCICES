<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000000, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.calculadora {
    background: rgb(255, 0, 204);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgb(0, 0, 0);
    text-align: center;
    width: 250px;
}


input, select {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}


button {
    width: 95%;
    padding: 10px;
    background: #000000;
    border: none;
    color: rgb(255, 255, 255);
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff0000;
}


.resultado {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="calculadora">
    <h2>Calculadora</h2>

    <input type="number" id="num1" placeholder="Primer número">
    <input type="number" id="num2" placeholder="Segundo número">

    <select id="operacion">
        <option value="+">Sumar (+)</option>
        <option value="-">Restar (-)</option>
        <option value="*">Multiplicar (*)</option>
        <option value="/">Dividir (/)</option>
    </select>

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let operacion = document.getElementById("operacion").value;

    let resultado;

    if (isNaN(num1) || isNaN(num2)) {
        resultado = "Ingresa números válidos";
    } else {
        switch (operacion) {
            case "+":
                resultado = num1 + num2;
                break;
            case "-":
                resultado = num1 - num2;
                break;
            case "*":
                resultado = num1 * num2;
                break;
            case "/":
                resultado = num2 !== 0 ? num1 / num2 : "No se puede dividir por 0";
                break;
        }
    }

    document.getElementById("resultado").innerText = "Resultado: " + resultado;
}
</script>

</body>
</html>
